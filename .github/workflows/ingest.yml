name: Ingest Odds Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      SPORTS: ${{ secrets.ODDS_SPORTS || 'upcoming' }}
      STRICT_FRESHNESS: ${{ secrets.STRICT_FRESHNESS || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip3 install -r requirements.txt

      - name: Fetch odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python3 -m src.ingest.fetcher

      - name: Commit raw data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f data/raw/
          git diff --cached --quiet || (git commit -m "Ingest odds snapshot $(date -u +%Y%m%d_%H%M%S)" && git push)
